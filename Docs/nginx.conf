root@vps29588:~# cat /etc/nginx/sites-enabled/010-lupws.conf
upstream websocketserver {
        server linkuup.de:61221;
}

server {
    server_name linkuup.de;
    listen 61222;
    ssl on;
    ssl_certificate /root/.acme.sh/linkuup.de/linkuup.de.cer;
    ssl_certificate_key /root/.acme.sh/linkuup.de/linkuup.de.key;

    access_log /var/log/lup-ws-access-ssl.log;
    error_log /var/log/lup-ws-error-ssl.log;

    location / {
            proxy_pass http://websocketserver;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 86400; # neccessary to avoid websocket timeou                                                                                                                                                             t disconnect
            proxy_redirect off;
    }
}
